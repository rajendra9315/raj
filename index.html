<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Mini App</title>

<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg, #1dd1a1, #54a0ff);
  padding: 15px;
}

.btn {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 12px;
  border: none;
  color: white;
  font-size: 16px;
}

/* COLORS */
.red { background:#ff3b3b; }
.green { background:#2ecc71; }
.blue { background:#2d8cff; }
.purple { background:#9b59b6; }
.orange { background:#f39c12; }

</style>
</head>

<body>

<h3 style="text-align:center;">🔥 My Panel</h3>

<button class="btn red">🔥 Red</button>
<button class="btn green">✅ Green</button>
<button class="btn blue">😎 Blue</button>
<button class="btn purple">💜 Premium</button>
<button class="btn orange">🍊 Orange</button>

</body>
</html>
